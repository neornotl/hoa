<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vịt Alkane Ultimate Pro - Full Fix</title>
    <style>
        :root { --bg: #0f172a; --lane: #1e293b; --accent: #f1c40f; --text: #f8fafc; --danger: #ef4444; }
        * { touch-action: manipulation; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 100%; max-width: 450px; border: 4px solid var(--lane); border-radius: 15px; outline: none; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        canvas { display: block; background: var(--bg); width: 100%; height: auto; }
        #hud { position: absolute; top: 15px; left: 15px; font-weight: 800; text-shadow: 2px 2px 4px #000; z-index: 5; font-size: 1.1rem; }
        .overlay { position: absolute; inset: 0; background: rgba(15,23,42,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; padding: 20px; text-align: center; }
        .menu-card { background: var(--lane); padding: 1.5rem; border-radius: 1.5rem; border: 2px solid var(--accent); width: 100%; }
        .tutorial { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 10px; margin: 10px 0; text-align: left; font-size: 0.85rem; border-left: 4px solid var(--accent); }
        #controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .touch-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.05); border: 2px solid var(--accent); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--accent); user-select: none; }
        .btn { border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 8px; transition: 0.2s; }
        .btn-easy { background: #2ecc71; color: white; }
        .btn-med { background: #f1c40f; color: #1e293b; }
        .btn-hard { background: #e74c3c; color: white; }
        #quiz-popup { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; border: 3px solid var(--accent); padding: 25px; border-radius: 20px; width: 90%; z-index: 100; box-shadow: 0 0 100px #000; }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 8px 0; background: #334155; color: white; border: 1px solid #475569; border-radius: 10px; text-align: left; cursor: pointer; }
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% {transform:translate(0,0)} 25% {transform:translate(-8px,0)} 75% {transform:translate(8px,0)} }
    </style>
</head>
<body onclick="document.getElementById('game-container').focus()">

<div id="game-container" tabindex="0">
    <div id="hud">ĐIỂM: <span id="score">0</span> | KỶ LỤC: <span id="highscore">0</span></div>
    <canvas id="gameCanvas" width="450" height="600"></canvas>

    <div id="start-menu" class="overlay">
        <div class="menu-card">
            <h1 style="color:var(--accent); margin:0; font-size: 1.5rem;">🦆 VỊT ALKANE ULTIMATE</h1>
            <div class="tutorial">
                <b>🎮 ĐIỀU KHIỂN:</b> WASD / Mũi tên / Nút ảo.<br>
                <b>⚡ LUẬT:</b> Qua đường +1đ. Đúng +2đ, Sai -5đ.
            </div>
            <p style="margin:5px 0">CHỌN ĐỘ KHÓ:</p>
            <button class="btn btn-easy" onclick="startGame('easy')">DỄ</button>
            <button class="btn btn-med" onclick="startGame('medium')">TRUNG BÌNH</button>
            <button class="btn btn-hard" onclick="startGame('hard')">KHÓ</button>
        </div>
    </div>

    <div id="quiz-popup">
        <h3 id="question-text" style="margin-top:0; color:var(--accent)">Đang tải...</h3>
        <div id="options-container"></div>
    </div>

    <div id="game-over" class="overlay" style="display:none">
        <div class="menu-card">
            <h1 style="color:var(--danger)">THẤT BẠI!</h1>
            <p id="final-score" style="font-size: 1.2rem"></p>
            <p>Mèo đang cười nhạo bạn đó! 😼</p>
            <button class="btn btn-med" onclick="location.reload()">CHƠI LẠI</button>
        </div>
    </div>
</div>

<div id="controls">
    <div style="grid-column: 2" class="touch-btn" onpointerdown="handleMove('up')">W</div>
    <div style="grid-column: 1" class="touch-btn" onpointerdown="handleMove('left')">A</div>
    <div style="grid-column: 2" class="touch-btn" onpointerdown="handleMove('down')">S</div>
    <div style="grid-column: 3" class="touch-btn" onpointerdown="handleMove('right')">D</div>
</div>

<script>
/** 🔊 1. KHÔI PHỤC ĐỦ 6 SOUND EFFECTS **/
const sfx = {
    correct: new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3'),
    wrong: new Audio('https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3'),
    death: new Audio('https://www.myinstants.com/media/sounds/cat-laughing.mp3'),
    road: new Audio('https://www.soundjay.com/transportation/sounds/street-traffic-1.mp3'),
    quack: new Audio('https://assets.mixkit.co/active_storage/sfx/1845/1845-preview.mp3'),
    quizOpen: new Audio('https://assets.mixkit.co/active_storage/sfx/1019/1019-preview.mp3')
};
sfx.road.loop = true; sfx.road.volume = 0.2;

const alkaneQuiz = [
    { q: "Alkane có liên kết đặc trưng nào?", a: ["Đơn sigma", "Đôi pi", "Ba", "Vòng"], c: 0 },
    { q: "Tên gọi khác của Alkane?", a: ["Paraffin", "Olefin", "Alkyne", "Aren"], c: 0 },
    { q: "Phản ứng đặc trưng nhất của Methane?", a: ["Thế", "Cộng", "Trùng hợp", "Thủy phân"], c: 0 },
    { q: "C4H10 có bao nhiêu đồng phân cấu tạo?", a: ["2", "3", "4", "5"], c: 0 },
    { q: "Sản phẩm chính khi Methane cháy?", a: ["CO2 và H2O", "CO và H2", "C và H2", "CH3OH"], c: 0 }
];

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let score = 0, highscore = localStorage.getItem('duck_final_v10') || 0;
let gameActive = false, isPaused = false, diffLevel = 'easy', floatTexts = [];
document.getElementById('highscore').innerText = highscore;

let duck = { x: 210, y: 540, w: 35, h: 35, invul: 0 };
let cars = [], lanes = [80, 140, 200, 260, 340, 400, 460, 520];

/** 🦆 2. KHÔI PHỤC MODEL VỊT CHI TIẾT **/
function drawDuck(x, y, invul) {
    ctx.save();
    if (invul > 0 && Math.floor(Date.now() / 100) % 2 === 0) ctx.globalAlpha = 0.3;
    ctx.fillStyle = "#f1c40f";
    ctx.beginPath(); ctx.ellipse(x+17, y+22, 16, 12, 0, 0, Math.PI*2); ctx.fill(); // Thân
    ctx.beginPath(); ctx.arc(x+25, y+10, 9, 0, Math.PI*2); ctx.fill(); // Đầu
    ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(x+28, y+8, 2, 0, Math.PI*2); ctx.fill(); // Mắt
    ctx.fillStyle = "#e67e22"; ctx.beginPath(); ctx.moveTo(x+32, y+10); ctx.lineTo(x+40, y+13); ctx.lineTo(x+32, y+16); ctx.fill(); // Mỏ
    ctx.restore();
}

/** 🕹️ 3. ĐIỀU KHIỂN FIX CHẶN LỖI GIỮ PHÍM **/
function handleMove(dir) {
    if (!gameActive || isPaused) return;
    if (dir === 'up') { 
        duck.y -= 60; if(Math.random()>0.8) sfx.quack.play();
        if (duck.y < 40) { score++; updateScore(); duck.y = 540; if(score % 5 === 0) triggerQuiz(); }
    }
    if (dir === 'down' && duck.y < 540) duck.y += 60;
    if (dir === 'left' && duck.x > 10) duck.x -= 40;
    if (dir === 'right' && duck.x < 400) duck.x += 40;
}

window.addEventListener('keydown', (e) => {
    if (isPaused) return; // Chặn hoàn toàn việc giữ phím khi đang Pause
    const key = e.key.toLowerCase();
    if(['w','s','a','d','arrowup','arrowdown','arrowleft','arrowright'].includes(key)) {
        e.preventDefault();
        handleMove(key.includes('up')||key==='w'?'up':key.includes('down')||key==='s'?'down':key.includes('left')||key==='a'?'left':'right');
    }
});

function startGame(mode) {
    diffLevel = mode; gameActive = true;
    document.getElementById('start-menu').style.display = 'none';
    document.getElementById('game-container').focus();
    sfx.road.play().catch(()=>{});
    requestAnimationFrame(gameLoop);
}

/** 📝 4. QUIZ FIX LỖI ĐỨNG YÊN **/
function triggerQuiz() {
    isPaused = true; sfx.quizOpen.play();
    const qData = alkaneQuiz[Math.floor(Math.random()*alkaneQuiz.length)];
    document.getElementById('question-text').innerText = qData.q;
    const cont = document.getElementById('options-container'); cont.innerHTML = '';
    
    qData.a.forEach((opt, i) => {
        const b = document.createElement('button');
        b.className = 'option-btn'; b.innerText = opt;
        b.onclick = (e) => {
            e.stopPropagation();
            if(i === qData.c) { score += 2; sfx.correct.play(); spawnFloat("+2!", "#10b981"); }
            else { 
                score -= 5; sfx.wrong.play(); spawnFloat("-5!", "#ef4444");
                document.getElementById('game-container').classList.add('shake');
                setTimeout(()=>document.getElementById('game-container').classList.remove('shake'), 300);
            }
            updateScore();
            document.getElementById('quiz-popup').style.display = 'none';
            // Quan trọng: Phải dùng setTimeout để đảm bảo trạng thái Pause được giải phóng sau khi DOM cập nhật
            setTimeout(() => { 
                isPaused = false; 
                duck.invul = 150; 
                document.getElementById('game-container').focus();
            }, 100);
        };
        cont.appendChild(b);
    });
    document.getElementById('quiz-popup').style.display = 'block';
}

function updateScore() {
    document.getElementById('score').innerText = score;
    if (score > highscore) { highscore = score; localStorage.setItem('duck_final_v10', highscore); document.getElementById('highscore').innerText = highscore; }
}

function spawnFloat(t, c) { floatTexts.push({ x: duck.x, y: duck.y, t: t, c: c, l: 60 }); }

function gameLoop() {
    if (!gameActive || isPaused) {
        if (gameActive) requestAnimationFrame(gameLoop); // Giữ vòng lặp chạy nhưng không update logic
        return;
    }
    
    ctx.clearRect(0, 0, 450, 600);
    ctx.fillStyle = "#1e293b"; lanes.forEach(y => ctx.fillRect(0, y, 450, 40));
    
    let spawnRate = (diffLevel==='easy'?0.02 : diffLevel==='medium'?0.04 : 0.07);
    if (Math.random() < spawnRate) {
        cars.push({ x: Math.random()>0.5?-80:500, y: lanes[Math.floor(Math.random()*lanes.length)]+2, spd: (diffLevel==='easy'?3:5) + score/20, dir: Math.random()>0.5?1:-1, col: `hsl(${Math.random()*360},70%,50%)` });
    }

    cars = cars.filter(c => {
        c.x += c.spd * c.dir;
        ctx.fillStyle = c.col; ctx.fillRect(c.x, c.y, 75, 36);
        ctx.fillStyle = "rgba(255,255,255,0.3)"; ctx.fillRect(c.dir===1?c.x+50:c.x+10, c.y+5, 15, 26); // Kính xe
        if (duck.invul <= 0 && duck.x < c.x+75 && duck.x+30 > c.x && duck.y < c.y+36 && duck.y+30 > c.y) gameOver();
        return c.x > -100 && c.x < 600;
    });

    if (duck.invul > 0) duck.invul--;
    drawDuck(duck.x, duck.y, duck.invul);
    floatTexts.forEach((f, i) => { ctx.fillStyle=f.c; ctx.font="bold 20px Arial"; ctx.fillText(f.t, f.x, f.y); f.y--; f.l--; if(f.l<=0) floatTexts.splice(i,1); });

    requestAnimationFrame(gameLoop);
}

function gameOver() {
    gameActive = false; sfx.road.pause(); sfx.death.play();
    document.getElementById('game-over').style.display = 'flex';
    document.getElementById('final-score').innerText = `Điểm cuối cùng: ${score}`;
}
</script>
</body>
</html>
